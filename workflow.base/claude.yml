name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(shellcheck *),Bash(find plugins -name '*.sh')"
          custom_instructions: |
            This is a Claude Code plugin repository (tne-plugins).
            Structure: plugins/<plugin-name>/hooks/, skills/, commands/, agents/
            - Skills are SKILL.md files with YAML frontmatter
            - Hooks (session-start.sh etc.) must output valid JSON
            - Shell scripts must use $HOME for global paths, never relative .claude/
            - Validate shell scripts with shellcheck when reviewing
          model: "claude-sonnet-4-20250514"
